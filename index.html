<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woggy</title>
  <script src="https://cdn.discordapp.com/activities/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #36393f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      z-index: 0;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
      z-index: 2;
    }
    .container {
      text-align: center;
      max-width: 520px;
    }
    .splash {
      width: 560px;
      max-width: 90%;
      margin: 0 auto 60px;
      filter: drop-shadow(0 15px 35px rgba(0,0,0,0.5));
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 340px;
      margin: 14px auto;
      padding: 18px 40px;
      font-size: 23px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      text-decoration: none;
    }
    .btn-single { background: #43b581; }
    .btn-multi { background: #7289da; }
    .btn-pref { background: #faa61a; }
    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    }

    /* SELECTOR STYLES - now unified for ALL groups */
    .flag-wrapper {
      cursor: pointer;
      transition: 0.18s ease;
    }
    .flag-wrapper:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.7));
    }
    .sp-lang-flag,
    .sp-validate-flag {
      width: 120px;
      height: 62px;
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    }
    .sp-validate-flag {
      width: 75px;
      height: 75px;
    }
    .flag-wrapper p {
      margin-top: 6px;
      font-size: 16px;
      text-align: center;
    }
    .flag-wrapper.selected,
    .sp-lang-flag.selected,
    .sp-validate-flag.selected {
      outline: 3px solid #43b581;
      outline-offset: 3px;
      transform: scale(1.12);
    }

    /* Other styles unchanged */
    .mode-btn { /* ... your existing mode-btn styles ... */ }
    .back-btn { /* ... your existing back-btn styles ... */ }
    .pref-title { font-size: 42px; font-weight: 600; margin-bottom: 50px; }
    .pref-section { margin-bottom: 50px; }
    .pref-section h3 { font-size: 18px; color: #b9bbbe; margin-bottom: 14px; }
    .slider-container { display: flex; align-items: center; gap: 20px; justify-content: center; }
    .slider-container input[type="range"] { width: 320px; accent-color: #43b581; }
    .slider-value { font-size: 28px; font-weight: 600; min-width: 40px; }
  </style>
</head>
<body>

  <!-- MAIN MENU -->
  <div class="screen active" id="mainScreen">
    <div class="container">
      <img src="splash.png" alt="Woggy" class="splash">
      <a href="#" id="singlePlayerBtn" class="btn btn-single">🎲 Single Player</a>
      <a href="#" id="preferencesBtn" class="btn btn-pref">⚙️ Preferences</a>
      <a href="#" onclick="startMultiplayer()" class="btn btn-multi">👥 Multiplayer</a>
    </div>
  </div>

  <!-- SINGLE PLAYER SCREEN (untouched) -->
  <div class="screen" id="singlePlayerScreen">
    <div class="container">
      <div class="sp-top-bar">
        <div class="sp-group">
          <h3>Language</h3>
          <div class="sp-language-selector">
            <div class="flag-wrapper" data-lang="en">
              <img src="flags/en.png" class="sp-lang-flag">
              <p>English</p>
            </div>
            <div class="flag-wrapper" data-lang="es">
              <img src="flags/es.png" class="sp-lang-flag">
              <p>Spanish</p>
            </div>
          </div>
        </div>
        <div class="sp-group">
          <h3>Word Validation</h3>
          <div class="sp-validation-selector">
            <div class="flag-wrapper" data-mode="standard">
              <img src="flags/standard.png" class="sp-validate-flag">
              <p>Standard</p>
            </div>
            <div class="flag-wrapper" data-mode="hardcore">
              <img src="flags/hardcore.png" class="sp-validate-flag">
              <p>Hardcore</p>
            </div>
          </div>
        </div>
      </div>
      <button onclick="startQuickplay()" class="mode-btn quickplay">⚡ Quickplay</button>
      <button onclick="startWorldTour()" class="mode-btn worldtour">🌎 World Tour</button>
      <button onclick="startBilingualTour()" class="mode-btn bilingual">🎌 Bilingual World Tour</button>
      <button onclick="startWordMonster()" class="mode-btn monster">🐉 Word Monster</button>
      <button type="button" class="back-btn" id="spBackBtn">← Back</button>
    </div>
  </div>

  <!-- PREFERENCES SCREEN -->
  <div class="screen" id="preferencesScreen">
    <div class="container">
      <h1 class="pref-title">Preferences</h1>

      <div class="pref-section">
        <h3>Default Language:</h3>
        <div style="display:flex; gap:30px; justify-content:center;">
          <div class="flag-wrapper" data-lang="en">
            <img src="flags/en.png" class="sp-lang-flag">
            <p>English</p>
          </div>
          <div class="flag-wrapper" data-lang="es">
            <img src="flags/es.png" class="sp-lang-flag">
            <p>Spanish</p>
          </div>
        </div>
      </div>

      <div class="pref-section">
        <h3>Tile Size:</h3>
        <div class="slider-container">
          <input type="range" id="tileSlider" min="1" max="20" value="10">
          <span id="sliderValue" class="slider-value">10</span>
        </div>
      </div>

      <div class="pref-section">
        <h3>Default Word Validation:</h3>
        <div style="display:flex; gap:30px; justify-content:center;">
          <div class="flag-wrapper" data-mode="standard">
            <img src="flags/standard.png" class="sp-validate-flag">
            <p>Standard</p>
          </div>
          <div class="flag-wrapper" data-mode="hardcore">
            <img src="flags/hardcore.png" class="sp-validate-flag">
            <p>Hardcore</p>
          </div>
        </div>
      </div>

      <div class="pref-section">
        <h3>Judge:</h3>
        <div style="display:flex; gap:30px; justify-content:center;">
          <div class="flag-wrapper judge-option" data-judge="on">
            <div style="font-size:52px; line-height:1;">✅</div>
            <p>ON</p>
          </div>
          <div class="flag-wrapper judge-option" data-judge="off">
            <div style="font-size:52px; line-height:1;">❌</div>
            <p>OFF</p>
          </div>
        </div>
      </div>

      <button type="button" class="back-btn" id="prefBackBtn">← Back</button>
    </div>
  </div>

  <script>
    let discordSdk;

    async function initSDK() {
      discordSdk = new window.DiscordSDK({ clientId: "1420786171822342226" });
      await discordSdk.ready();
      console.log("Discord SDK ready");
    }

    function showSinglePlayer() { /* ... unchanged ... */ }
    function showPreferences() { /* ... unchanged ... */ }
    function backToMain() { /* ... unchanged ... */ }

    function startQuickplay() { alert("Starting Quickplay..."); }
    function startWorldTour() { alert("Starting World Tour..."); }
    function startBilingualTour() { alert("Starting Bilingual World Tour..."); }
    function startWordMonster() { alert("Starting Word Monster..."); }
    function startMultiplayer() { alert("Multiplayer coming soon"); }

    window.onload = function() {
      initSDK();
      document.getElementById("singlePlayerBtn").addEventListener("click", showSinglePlayer);
      document.getElementById("preferencesBtn").addEventListener("click", showPreferences);

      const spBack = document.getElementById("spBackBtn");
      const prefBack = document.getElementById("prefBackBtn");
      if (spBack) spBack.addEventListener("click", backToMain);
      if (prefBack) prefBack.addEventListener("click", backToMain);

      const slider = document.getElementById("tileSlider");
      const valueDisplay = document.getElementById("sliderValue");
      if (slider && valueDisplay) {
        slider.addEventListener("input", () => valueDisplay.textContent = slider.value);
      }
    };

    window.addEventListener('load', () => {
      document.querySelectorAll('.flag-wrapper').forEach(wrapper => {
        wrapper.addEventListener('click', () => {
          const parent = wrapper.parentElement;
          parent.querySelectorAll('.flag-wrapper').forEach(w => w.classList.remove('selected'));
          wrapper.classList.add('selected');
        });
      });
    });
  </script>
</body>
</html>
