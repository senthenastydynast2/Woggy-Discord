<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woggy</title>
  <script src="https://cdn.discordapp.com/activities/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #36393f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 420px;
    }

    .logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #43b581, #7289da);
      border-radius: 20px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 42px;
      margin: 0 0 10px 0;
      font-weight: 600;
    }

    p {
      font-size: 22px;
      color: #b9bbbe;
      margin-bottom: 50px;
    }

    button {
      background: #43b581;
      color: white;
      border: none;
      padding: 18px 60px;
      font-size: 24px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(67, 181, 129, 0.4);
      transition: all 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 25px rgba(67, 181, 129, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🧩</div>
    <h1>Welcome to Woggy</h1>
    <p>Ready to get started?</p>
    <button onclick="startGame()">Play Now</button>
  </div>

  <script>
    let discordSdk;

    async function initDiscordSDK() {
      discordSdk = new window.DiscordSDK({
        clientId: "1420786171822342226"
      });

      await discordSdk.ready();
      console.log("✅ Discord Activity SDK initialized and connected");
    }

    async function startGame() {
      const btn = document.querySelector('button');
      btn.innerHTML = '🚀 Starting...';
      btn.style.background = '#faa61a';

      try {
        await initDiscordSDK();
        alert("🎉 Activity is connected!\n\nNext step: We’ll build the real game interface here.");
      } catch (e) {
        console.error(e);
        alert("Failed to connect to Discord Activity SDK");
      }

      btn.innerHTML = 'Play Now';
      btn.style.background = '#43b581';
    }

    // Auto-initialize when page loads
    window.onload = initDiscordSDK;
  </script>
</body>
</html>
