<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woggy</title>
  <script src="https://cdn.discordapp.com/activities/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #36393f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    .container {
      text-align: center;
      max-width: 520px;
    }

    .splash {
      width: 560px;
      max-width: 90%;
      margin: 0 auto 60px;
      filter: drop-shadow(0 15px 35px rgba(0,0,0,0.5));
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 340px;
      margin: 14px auto;
      padding: 18px 40px;
      font-size: 23px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      text-decoration: none;
    }

    .btn-single { background: #43b581; }
    .btn-multi  { background: #7289da; }
    .btn-pref   { background: #faa61a; }

    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    }

    /* Single Player Screen */
    .selector-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 50px;
      gap: 40px;
    }

    .selector h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #b9bbbe;
    }

    .flag {
      font-size: 68px;
      padding: 20px 32px;           /* Wider by ~15px each side */
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 4px solid transparent;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));   /* Drop shadow on the box */
    }

    .flag.selected {
      border-color: #43b581;
      transform: scale(1.1);
    }

    .mode-btn {
      display: block;
      width: 100%;
      max-width: 360px;
      margin: 14px auto;
      padding: 18px 55px; /* +15px wider on each side */
      font-size: 23px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      text-shadow: 1.5px 1.5px 4px rgba(0,0,0,0.6); /* drop shadow on text */
    }

    .mode-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 14px 32px rgba(0,0,0,0.5);
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    }

    /* Colors for modes */
    .quickplay  { background: #faa61a; }   /* Yellow */
    .worldtour  { background: #7289da; }   /* Blue */
    .bilingual  { background: #f47f20; }   /* Orange */
    .monster    { background: #43b581; }   /* Green */
    
  </style>
</head>
<body>

  <!-- MAIN MENU - UNTOUCHED -->
  <div class="screen active" id="mainScreen">
    <div class="container">
      <img src="splash.png" alt="Woggy" class="splash">
      <a href="#" id="singlePlayerBtn" class="btn btn-single">🎲 Single Player</a>
      <a href="#" onclick="startMultiplayer()" class="btn btn-multi">👥 Multiplayer</a>
      <a href="#" onclick="openPreferences()" class="btn btn-pref">⚙️ Preferences</a>
    </div>
  </div>

  <!-- SINGLE PLAYER MENU -->
  <div class="screen" id="singlePlayerScreen">
    <div class="container">
      <div class="selector-row">
        <div class="selector">
          <h3>Language:</h3>
          <span onclick="selectLanguage(this)" class="flag selected" id="lang-en">🇺🇸</span>
          <span onclick="selectLanguage(this)" class="flag" id="lang-es">🇪🇸</span>
        </div>
        <div class="selector">
          <h3>Word Validation:</h3>
          <span onclick="selectValidation(this)" class="flag selected" id="val-standard">😀</span>
          <span onclick="selectValidation(this)" class="flag" id="val-hardcore">😈</span>
        </div>
      </div>

      <button onclick="startQuickplay()" class="mode-btn quickplay">⚡ Quickplay</button>
      <button onclick="startWorldTour()" class="mode-btn worldtour">🌎 World Tour</button>
      <button onclick="startBilingualTour()" class="mode-btn bilingual">🎌 Bilingual World Tour</button>
      <button onclick="startWordMonster()" class="mode-btn monster">🐉 Word Monster</button>

      <button onclick="backToMain()" style="margin-top:40px; background:#faa61a; color:white; padding:14px 40px; font-size:18px; border:none; border-radius:12px; cursor:pointer;">
        ← Back
      </button>
    </div>
  </div>

  <script>
    let discordSdk;

    async function initSDK() {
      discordSdk = new window.DiscordSDK({ clientId: "1420786171822342226" });
      await discordSdk.ready();
      console.log("✅ Discord SDK ready");
    }

    function showSinglePlayer() {
      document.getElementById("mainScreen").classList.remove("active");
      document.getElementById("singlePlayerScreen").classList.add("active");
    }

    function backToMain() {
      document.getElementById("singlePlayerScreen").classList.remove("active");
      document.getElementById("mainScreen").classList.add("active");
    }

    function selectLanguage(el) {
      document.querySelectorAll('#singlePlayerScreen .flag').forEach(f => f.classList.remove("selected"));
      el.classList.add("selected");
    }

    function selectValidation(el) {
      document.querySelectorAll('#singlePlayerScreen .flag').forEach(f => f.classList.remove("selected"));
      el.classList.add("selected");
    }

    function startQuickplay()     { alert("🎮 Starting Quickplay..."); }
    function startWorldTour()     { alert("🌍 Starting World Tour..."); }
    function startBilingualTour() { alert("🌐 Starting Bilingual World Tour..."); }
    function startWordMonster()   { alert("🐉 Starting Word Monster..."); }

    function startMultiplayer()   { alert("👥 Multiplayer (coming soon)"); }
    function openPreferences()    { alert("⚙️ Preferences (coming soon)"); }

    window.onload = function() {
      initSDK();
      const singleBtn = document.getElementById("singlePlayerBtn");
      if (singleBtn) singleBtn.addEventListener("click", showSinglePlayer);
    };
  </script>
</body>
</html>
