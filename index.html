<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woggy</title>
  <script src="https://cdn.discordapp.com/activities/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #36393f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    .container {
      text-align: center;
      max-width: 520px;
    }

    .splash {
      width: 560px;
      max-width: 90%;
      margin: 0 auto 60px;
      filter: drop-shadow(0 15px 35px rgba(0,0,0,0.5));
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 340px;
      margin: 14px auto;
      padding: 18px 40px;
      font-size: 23px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      text-decoration: none;
    }

    .btn-single { background: #43b581; }
    .btn-multi  { background: #7289da; }
    .btn-pref   { background: #faa61a; }

    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    }

    /* Single Player Screen */
    .selector-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 50px;
      gap: 40px;
    }

    .selector h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #b9bbbe;
    }

    .flag {
      font-size: 68px;
      padding: 8px 16px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 4px solid transparent;
    }

    .flag.selected {
      border-color: #43b581;
      transform: scale(1.1);
    }

      display: block;
      width: 100%;
      max-width: 360px;
