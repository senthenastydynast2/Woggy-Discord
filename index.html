<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woggy</title>
  <script src="https://cdn.discordapp.com/activities/sdk.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #36393f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    .container {
      text-align: center;
      max-width: 520px;
    }

    .splash {
      width: 560px;
      max-width: 90%;
      margin: 0 auto 60px;
      filter: drop-shadow(0 15px 35px rgba(0,0,0,0.5));
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 340px;
      margin: 14px auto;
      padding: 18px 40px;
      font-size: 23px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      text-decoration: none;
    }

    .btn-single { background: #43b581; }
    .btn-multi  { background: #7289da; }
    .btn-pref   { background: #faa61a; }

    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    }

    /* TOP BAR */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 20px 30px;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .language-selector,
    .validation-selector {
      display: flex;
      gap: 12px;
    }

    .lang-flag,
    .validate-flag {
      width: 42px;
      height: 42px;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
      border-radius: 6px;
    }

    .lang-flag:hover,
    .validate-flag:hover {
      transform: scale(1.12);
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.65));
    }

    .lang-flag.selected,
    .validate-flag.selected {
      outline: 3px solid #fff;
      transform: scale(1.1);
    }

    /* SINGLE PLAYER SCREEN */
    .flag-select {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin: 20px 0 40px;
    }

    .flag-wrapper {
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .flag-wrapper:hover {
      transform: scale(1.08);
    }

    .flag {
      width: 120px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
      transition: all 0.2s ease;
      opacity: 0.9;
    }

    .flag:hover {
      transform: scale(1.07);
      opacity: 1;
      box-shadow: 0 10px 24px rgba(0,0,0,0.45);
    }

    .flag.selected {
      outline: 4px solid #43b581;
      outline-offset: 4px;
      opacity: 1;
      transform: scale(1.1);
      box-shadow: 0 10px 26px rgba(0,0,0,0.55);
    }

    .mode-btn {
      display: block;
      width: 100%;
      max-width: 360px;
      margin: 14px auto;
      padding: 18px 55px;
      font-size: 23px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      text-shadow: 1.5px 1.5px 4px rgba(0,0,0,0.6);
    }

    .mode-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 14px 32px rgba(0,0,0,0.5);
    }

    /* COLORS */
    .quickplay  { background: #faa61a; }
    .worldtour  { background: #7289da; }
    .bilingual  { background: #f47f20; }
    .monster    { background: #43b581; }

    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 32px;
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(180deg, #585d67, #3c4047);
      color: white;
      border-radius: 40px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.18s;
    }

    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.45);
    }
  </style>
</head>

<body>

  <!-- TOP BAR ALWAYS VISIBLE -->
  <div class="top-bar">
    <div class="language-selector">
      <img src="flags/en.png" class="lang-flag" data-lang="en">
      <img src="flags/es.png" class="lang-flag" data-lang="es">
    </div>

    <div class="validation-selector">
      <img src="flags/standard.png" class="validate-flag" data-mode="standard">
      <img src="flags/hardcore.png" class="validate-flag" data-mode="hardcore">
    </div>
  </div>

  <!-- MAIN MENU -->
  <div class="screen active" id="mainScreen">
    <div class="container">
      <img src="splash.png" alt="Woggy" class="splash">
      <a href="#" id="singlePlayerBtn" class="btn btn-single">🎲 Single Player</a>
      <a href="#" onclick="startMultiplayer()" class="btn btn-multi">👥 Multiplayer</a>
      <a href="#" onclick="openPreferences()" class="btn btn-pref">⚙️ Preferences</a>
    </div>
  </div>

  <!-- SINGLE PLAYER -->
  <div class="screen" id="singlePlayerScreen">
    <div class="container">

      <h3>Select Language</h3>
      <div class="flag-select">
        <div class="flag-wrapper" onclick="selectFlag('flag-en')">
          <img id="flag-en" src="flags/en.png" class="flag">
          <p>English</p>
        </div>

        <div class="flag-wrapper" onclick="selectFlag('flag-es')">
          <img id="flag-es" src="flags/es.png" class="flag">
          <p>Spanish</p>
        </div>
      </div>

      <button onclick="startQuickplay()" class="mode-btn quickplay">⚡ Quickplay</button>
      <button onclick="startWorldTour()" class="mode-btn worldtour">🌎 World Tour</button>
      <button onclick="startBilingualTour()" class="mode-btn bilingual">🎌 Bilingual World Tour</button>
      <button onclick="startWordMonster()" class="mode-btn monster">🐉 Word Monster</button>
      <button onclick="backToMain()" class="back-btn">← Back</button>

    </div>
  </div>

  <script>
    let discordSdk;

    async function initSDK() {
      discordSdk = new window.DiscordSDK({ clientId: "1420786171822342226" });
      await discordSdk.ready();
      console.log("Discord SDK ready");
    }

    function showSinglePlayer() {
      document.getElementById("mainScreen").classList.remove("active");
      document.getElementById("singlePlayerScreen").classList.add("active");
    }

    function backToMain() {
      document.getElementById("singlePlayerScreen").classList.remove("active");
      document.getElementById("mainScreen").classList.add("active");
    }

    function selectFlag(id) {
      document.querySelectorAll('.flag').forEach(f => f.classList.remove('selected'));
      document.getElementById(id).classList.add('selected');
    }

    function startQuickplay()     { alert("Starting Quickplay..."); }
    function startWorldTour()     { alert("Starting World Tour..."); }
    function startBilingualTour() { alert("Starting Bilingual World Tour..."); }
    function startWordMonster()   { alert("Starting Word Monster..."); }

    function startMultiplayer()   { alert("Multiplayer coming soon"); }
    function openPreferences()    { alert("Preferences coming soon"); }

    window.onload = function() {
      initSDK();
      document.getElementById("singlePlayerBtn").addEventListener("click", showSinglePlayer);
    };

    // Top language selector
    document.querySelectorAll('.lang-flag').forEach(flag => {
      flag.addEventListener('click', () => {
        document.querySelectorAll('.lang-flag').forEach(f => f.classList.remove('selected'));
        flag.classList.add('selected');
        console.log("Language changed to:", flag.dataset.lang);
      });
    });

    // Validation selector
    document.querySelectorAll('.validate-flag').forEach(flag => {
      flag.addEventListener('click', () => {
        document.querySelectorAll('.validate-flag').forEach(f => f.classList.remove('selected'));
        flag.classList.add('selected');
        console.log("Validation mode:", flag.dataset.mode);
      });
    });
  </script>

</body>
</html>
