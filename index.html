<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woggy</title>
  <script src="https://cdn.discordapp.com/activities/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #36393f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    .container {
      text-align: center;
      max-width: 520px;
    }

    .splash {
      width: 560px;
      max-width: 90%;
      margin: 0 auto 40px;
      filter: drop-shadow(0 15px 35px rgba(0,0,0,0.5));
    }

    h1 {
      font-size: 48px;
      margin: 0 0 8px 0;
      font-weight: 600;
    }

    .subtitle {
      font-size: 22px;
      color: #b9bbbe;
      margin-bottom: 50px;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 340px;
      margin: 14px auto;
      padding: 18px 40px;
      font-size: 23px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-single { background: #43b581; color: white; }
    .btn-multi  { background: #7289da; color: white; }
    .btn-pref   { background: #faa61a; color: white; }

    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    }

    /* Single Player Screen */
    .selector-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 60px;
      gap: 40px;
    }

    .selector {
      text-align: center;
    }

    .selector h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #b9bbbe;
    }

    .flag {
      font-size: 68px;
      padding: 8px 16px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 4px solid transparent;
    }

    .flag.selected {
      border-color: #43b581;
      transform: scale(1.1);
    }

    .mode-btn {
      font-size: 26px;
      padding: 20px 40px;
      margin: 12px auto;
      width: 100%;
      max-width: 360px;
      border-radius: 14px;
      background: #2f3136;
      color: #fff;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn:hover {
      background: #40444b;
      transform: scale(1.03);
    }

    .mode-btn.selected {
      border-color: #43b581;
    }
  </style>
</head>
<body>

  <!-- MAIN MENU -->
  <div class="screen active" id="mainScreen">
    <div class="container">
      <img src="splash.png" alt="Woggy" class="splash">
      <a href="#" onclick="showSinglePlayer()" class="btn btn-single">🎲 Single Player</a>
      <a href="#" onclick="startMultiplayer()" class="btn btn-multi">👥 Multiplayer</a>
      <a href="#" onclick="openPreferences()" class="btn btn-pref">⚙️ Preferences</a>
    </div>
  </div>

  <!-- SINGLE PLAYER MENU -->
  <div class="screen" id="singlePlayerScreen">
    <div class="container">
      <div class="selector-row">
        <!-- Language -->
        <div class="selector">
          <h3>Language:</h3>
          <span onclick="selectLanguage(this)" class="flag selected" id="lang-en">🇺🇸</span>
          <span onclick="selectLanguage(this)" class="flag" id="lang-es">🇪🇸</span>
        </div>

        <!-- Word Validation -->
        <div class="selector">
          <h3>Word Validation:</h3>
          <span onclick="selectValidation(this)" class="flag selected" id="val-standard">😀</span>
          <span onclick="selectValidation(this)" class="flag" id="val-hardcore">😈</span>
        </div>
      </div>

      <div style="margin-top: 20px;">
        <button onclick="startQuickplay()" class="mode-btn">Quickplay</button>
        <button onclick="startWorldTour()" class="mode-btn">World Tour</button>
        <button onclick="startBilingualTour()" class="mode-btn">Bilingual World Tour</button>
        <button onclick="startWordMonster()" class="mode-btn">Word Monster</button>
      </div>

      <button onclick="backToMain()" style="margin-top:40px; background:#faa61a; color:white; padding:14px 40px; font-size:18px; border:none; border-radius:12px; cursor:pointer;">
        ← Back
      </button>
    </div>
  </div>

  <script>
    let discordSdk;

    async function initSDK() {
      discordSdk = new window.DiscordSDK({ clientId: "1420786171822342226" });
      await discordSdk.ready();
      console.log("✅ Discord Activity SDK connected");
    }

    function showSinglePlayer() {
      document.getElementById("mainScreen").classList.remove("active");
      document.getElementById("singlePlayerScreen").classList.add("active");
    }

    function backToMain() {
      document.getElementById("singlePlayerScreen").classList.remove("active");
      document.getElementById("mainScreen").classList.add("active");
    }

    function selectLanguage(el) {
      document.querySelectorAll('#singlePlayerScreen .flag').forEach(f => f.classList.remove("selected"));
      el.classList.add("selected");
    }

    function selectValidation(el) {
      document.querySelectorAll('#singlePlayerScreen .flag').forEach(f => f.classList.remove("selected"));
      el.classList.add("selected");
    }

    function startQuickplay()     { alert("🎮 Starting Quickplay..."); }
    function startWorldTour()     { alert("🌍 Starting World Tour..."); }
    function startBilingualTour() { alert("🌐 Starting Bilingual World Tour..."); }
    function startWordMonster()   { alert("🐉 Starting Word Monster..."); }

    function startMultiplayer()   { alert("👥 Multiplayer mode selected!\n\n(Coming soon)"); }
    function openPreferences()    { alert("⚙️ Preferences menu would open here"); }

    window.onload = initSDK;
  </script>
</body>
</html>
