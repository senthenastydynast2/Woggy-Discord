<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woggy</title>
  <script src="https://cdn.discordapp.com/activities/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #36393f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 480px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .container.ready {
      opacity: 1;
    }

    .splash {
      width: 560px;           /* Twice as big as before */
      max-width: 90%;         /* Prevents it from becoming too huge on small screens */
      margin: 0 auto 60px;    /* More space below the logo for better centering */
      filter: drop-shadow(0 15px 35px rgba(0,0,0,0.5));
    }

    h1 {
      font-size: 48px;
      margin: 0 0 10px 0;
      font-weight: 600;
    }

    .subtitle {
      font-size: 22px;
      color: #b9bbbe;
      margin-bottom: 60px;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 12px auto;
      padding: 18px 40px;
      font-size: 22px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-single { background: #43b581; color: white; }
    .btn-multi  { background: #7289da; color: white; }
    .btn-pref   { background: #faa61a; color: white; }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
 <div class="container" id="mainContainer">
    <img src="splash.png" alt="Woggy" class="splash">
    <a href="#" onclick="startSinglePlayer()" class="btn btn-single">🎲 Single Player</a>
    <a href="#" onclick="startMultiplayer()" class="btn btn-multi">👥 Multiplayer</a>
    <a href="#" onclick="openPreferences()" class="btn btn-pref">⚙️ Preferences</a>
  </div>

  <script>
    let discordSdk;

    async function initSDK() {
      try {
        discordSdk = new window.DiscordSDK({
          clientId: "1420786171822342226"
        });

        await discordSdk.ready();
        console.log("✅ Discord Activity SDK connected");

        // Show the UI only after handshake
        document.getElementById("mainContainer").classList.add("ready");

      } catch (e) {
        console.error("SDK failed:", e);
        // Still show UI even if SDK fails (fallback)
        document.getElementById("mainContainer").classList.add("ready");
      }
    }

    function startSinglePlayer() {
      alert("Single Player selected!\n\nNext step: We’ll build the real 4x4 board here.");
    }

    function startMultiplayer() {
      alert("Multiplayer mode selected!\n\n(Coming soon)");
    }

    function openPreferences() {
      alert("Preferences menu would open here.");
    }

    // Initialize as soon as possible
    window.onload = initSDK;
  </script>
</body>
</html>
