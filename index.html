<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woggy</title>
  <script src="https://cdn.discordapp.com/activities/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #36393f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }
    /* CLEANED SCREEN SYSTEM */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      z-index: 0;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
      z-index: 2;
    }
    .container {
      text-align: center;
      max-width: 520px;
    }
    .splash {
      width: 560px;
      max-width: 90%;
      margin: 0 auto 60px;
      filter: drop-shadow(0 15px 35px rgba(0,0,0,0.5));
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 340px;
      margin: 14px auto;
      padding: 18px 40px;
      font-size: 23px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      text-decoration: none;
    }
    .btn-single { background: #43b581; }
    .btn-multi { background: #7289da; }
    .btn-pref { background: #faa61a; }
    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    }
    /* SINGLE PLAYER TOP BAR (unchanged) */
    .sp-top-bar {
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      margin-bottom: 40px;
      padding: 0 10px;
      gap: 60px;
    }
    .sp-language-selector,
    .sp-validation-selector {
      display: flex;
      gap: 26px;
      align-items: center;
    }
    .sp-lang-flag {
      width: 120px;
      height: 62px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.18s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    }
    .sp-validate-flag {
      width: 75px;
      height: 75px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.18s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    }
    .sp-lang-flag:hover,
    .sp-validate-flag:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.7));
    }
    .flag-wrapper p {
      margin-top: 6px;
      font-size: 16px;
      text-align: center;
    }
    .sp-lang-flag.selected,
    .sp-validate-flag.selected {
      outline: 3px solid #43b581;
      outline-offset: 3px;
      transform: scale(1.12);
    }
    .mode-btn {
      display: block;
      width: 100%;
      max-width: 360px;
      margin: 14px auto;
      padding: 18px 55px;
      font-size: 23px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      text-shadow: 1.5px 1.5px 4px rgba(0,0,0,0.6);
    }
    .mode-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 14px 32px rgba(0,0,0,0.5);
    }
    .sp-group {
      text-align: center;
    }
    .sp-group h3 {
      margin-bottom: 16px;
      margin-top: 0;
      font-weight: 600;
    }
    .quickplay { background: #faa61a; }
    .worldtour { background: #7289da; }
    .bilingual { background: #f47f20; }
    .monster { background: #43b581; }
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 32px;
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(180deg, #585d67, #3c4047);
      color: white;
      border-radius: 40px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.18s;
    }
    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.45);
    }

    /* PREFERENCES STYLES (unchanged) */
    .pref-title {
      font-size: 42px;
      font-weight: 600;
      margin-bottom: 50px;
    }
    .pref-section {
      margin-bottom: 50px;
    }
    .pref-section h3 {
      font-size: 18px;
      color: #b9bbbe;
      margin-bottom: 14px;
    }
    .slider-container {
      display: flex;
      align-items: center;
      gap: 20px;
      justify-content: center;
    }
    .slider-container input[type="range"] {
      width: 320px;
      accent-color: #43b581;
    }
    .slider-value {
      font-size: 28px;
      font-weight: 600;
      min-width: 40px;
    }
  </style>
</head>
<body>

  <!-- MAIN MENU -->
  <div class="screen active" id="mainScreen">
    <div class="container">
      <img src="splash.png" alt="Woggy" class="splash">
      <a href="#" id="singlePlayerBtn" class="btn btn-single">🎲 Single Player</a>
      <a href="#" id="preferencesBtn" class="btn btn-pref">⚙️ Preferences</a>
      <a href="#" onclick="startMultiplayer()" class="btn btn-multi">👥 Multiplayer</a>
    </div>
  </div>

  <!-- SINGLE PLAYER SCREEN (100% untouched) -->
  <div class="screen" id="singlePlayerScreen">
    <div class="container">
      <div class="sp-top-bar">
        <div class="sp-group">
          <h3>Language</h3>
          <div class="sp-language-selector">
            <div class="flag-wrapper" data-lang="en">
              <img src="flags/en.png" class="sp-lang-flag">
              <p>English</p>
            </div>
            <div class="flag-wrapper" data-lang="es">
              <img src="flags/es.png" class="sp-lang-flag">
              <p>Spanish</p>
            </div>
          </div>
        </div>
        <div class="sp-group">
          <h3>Word Validation</h3>
          <div class="sp-validation-selector">
            <div class="flag-wrapper" data-mode="standard">
              <img src="flags/standard.png" class="sp-validate-flag">
              <p>Standard</p>
            </div>
            <div class="flag-wrapper" data-mode="hardcore">
              <img src="flags/hardcore.png" class="sp-validate-flag">
              <p>Hardcore</p>
            </div>
          </div>
        </div>
      </div>
      <button onclick="startQuickplay()" class="mode-btn quickplay">⚡ Quickplay</button>
      <button onclick="startWorldTour()" class="mode-btn worldtour">🌎 World Tour</button>
      <button onclick="startBilingualTour()" class="mode-btn bilingual">🎌 Bilingual World Tour</button>
      <button onclick="startWordMonster()" class="mode-btn monster">🐉 Word Monster</button>
      <button type="button" class="back-btn" id="spBackBtn">← Back</button>
    </div>
  </div>

  <!-- PREFERENCES SCREEN -->
  <div class="screen" id="preferencesScreen">
    <div class="container">
      <h1 class="pref-title">Preferences</h1>

      <div class="pref-section">
        <h3>Default Language:</h3>
        <div style="display:flex; gap:30px; justify-content:center;">
          <div class="flag-wrapper" data-lang="en">
            <img src="flags/en.png" class="sp-lang-flag">
            <p>English</p>
          </div>
          <div class="flag-wrapper" data-lang="es">
            <img src="flags/es.png" class="sp-lang-flag">
            <p>Spanish</p>
          </div>
        </div>
      </div>

      <div class="pref-section">
        <h3>Tile Size:</h3>
        <div class="slider-container">
          <input type="range" id="tileSlider" min="1" max="20" value="10">
          <span id="sliderValue" class="slider-value">10</span>
        </div>
      </div>

      <div class="pref-section">
        <h3>Default Word Validation:</h3>
        <div style="display:flex; gap:30px; justify-content:center;">
          <div class="flag-wrapper" data-mode="standard">
            <img src="flags/standard.png" class="sp-validate-flag">
            <p>Standard</p>
          </div>
          <div class="flag-wrapper" data-mode="hardcore">
            <img src="flags/hardcore.png" class="sp-validate-flag">
            <p>Hardcore</p>
          </div>
        </div>
      </div>

      <!-- JUDGE SECTION - now fully selectable -->
      <div class="pref-section">
        <h3>Judge:</h3>
        <div style="display:flex; gap:30px; justify-content:center;">
          <div class="flag-wrapper judge-option" data-judge="on">
            <div style="font-size:52px; line-height:1;">✅</div>
            <p>ON</p>
          </div>
          <div class="flag-wrapper judge-option" data-judge="off">
            <div style="font-size:52px; line-height:1;">❌</div>
            <p>OFF</p>
          </div>
        </div>
      </div>

      <button type="button" class="back-btn" id="prefBackBtn">← Back</button>
    </div>
  </div>

  <script>
    let discordSdk;

    async function initSDK() {
      discordSdk = new window.DiscordSDK({ clientId: "1420786171822342226" });
      await discordSdk.ready();
      console.log("Discord SDK ready");
    }

    function showSinglePlayer() {
      const main = document.getElementById("mainScreen");
      const sp = document.getElementById("singlePlayerScreen");
      main.classList.remove("active");
      sp.style.opacity = "0";
      sp.classList.add("active");
      requestAnimationFrame(() => { sp.style.opacity = "1"; });
    }

    function showPreferences() {
      const main = document.getElementById("mainScreen");
      const pref = document.getElementById("preferencesScreen");
      main.classList.remove("active");
      pref.style.opacity = "0";
      pref.classList.add("active");
      requestAnimationFrame(() => { pref.style.opacity = "1"; });
    }

    function backToMain() {
      const sp = document.getElementById("singlePlayerScreen");
      const pref = document.getElementById("preferencesScreen");
      const main = document.getElementById("mainScreen");
      if (sp.classList.contains("active")) sp.style.opacity = "0";
      if (pref.classList.contains("active")) pref.style.opacity = "0";
      setTimeout(() => {
        sp.classList.remove("active");
        pref.classList.remove("active");
        main.classList.add("active");
      }, 350);
    }

    function startQuickplay() { alert("Starting Quickplay..."); }
    function startWorldTour() { alert("Starting World Tour..."); }
    function startBilingualTour() { alert("Starting Bilingual World Tour..."); }
    function startWordMonster() { alert("Starting Word Monster..."); }
    function startMultiplayer() { alert("Multiplayer coming soon"); }

    window.onload = function() {
      initSDK();

      document.getElementById("singlePlayerBtn").addEventListener("click", showSinglePlayer);
      document.getElementById("preferencesBtn").addEventListener("click", showPreferences);

      const spBack = document.getElementById("spBackBtn");
      const prefBack = document.getElementById("prefBackBtn");
      if (spBack) spBack.addEventListener("click", backToMain);
      if (prefBack) prefBack.addEventListener("click", backToMain);

      const slider = document.getElementById("tileSlider");
      const valueDisplay = document.getElementById("sliderValue");
      if (slider && valueDisplay) {
        slider.addEventListener("input", () => valueDisplay.textContent = slider.value);
      }
    };

    // SINGLE SELECTION PER GROUP - fixed and reliable
    window.addEventListener('load', () => {
      // Language group
      document.querySelectorAll('.flag-wrapper[data-lang]').forEach(wrapper => {
        wrapper.addEventListener('click', () => {
          document.querySelectorAll('.flag-wrapper[data-lang] img').forEach(img => img.classList.remove('selected'));
          wrapper.querySelector('img').classList.add('selected');
        });
      });

      // Word Validation group
      document.querySelectorAll('.flag-wrapper[data-mode]').forEach(wrapper => {
        wrapper.addEventListener('click', () => {
          document.querySelectorAll('.flag-wrapper[data-mode] img').forEach(img => img.classList.remove('selected'));
          wrapper.querySelector('img').classList.add('selected');
        });
      });

      // Judge group - now fully working
      document.querySelectorAll('.judge-option').forEach(wrapper => {
        wrapper.addEventListener('click', () => {
          document.querySelectorAll('.judge-option').forEach(w => w.classList.remove('selected'));
          wrapper.classList.add('selected');
        });
      });
    });
  </script>
</body>
</html>
